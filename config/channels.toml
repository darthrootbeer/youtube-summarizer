# YouTube sources to monitor (channels and/or playlists).
#
# Recommended:
# - **Channel** URL with channel_id:
#   https://www.youtube.com/channel/UCxxxxxxxxxxxxxxxxxxxxxx
# - **Playlist** URL with playlist_id:
#   https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxxxxxxxx
#
# This lets us build RSS feeds without needing API keys.
#
# Each entry:
# - name: friendly label (used in emails)
# - url: channel OR playlist URL
# - prompt: optional prompt key from config/prompts.toml (defaults to "default")
#
# Notes:
# - We intentionally prefer channel_id / playlist_id URLs because they work cleanly with RSS.
# - “Handle” URLs like https://www.youtube.com/@somehandle may not work reliably here.

channels = [
