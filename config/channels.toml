# YouTube Sources
#
# This file is divided into three sections. Each section uses a different prompt.
#
# ─── HOW PROMPTS WORK ─────────────────────────────────────────────────────────
#
#   Summarize mode  →  config/prompts/*.md
#     All prompts with `enabled: true` run on every video by default.
#
#     To run specific prompts for a feed, add a `prompts` list:
#       prompts = ["default", "glossary"]
#
#   Transcribe mode →  config/transcribe.md
#     Cleans up the raw transcript for reading. Does NOT summarize.
#     Options (remove fillers, paragraph breaks, etc.) are also set there.
#
# ──────────────────────────────────────────────────────────────────────────────


# ─── SUBSCRIPTIONS ────────────────────────────────────────────────────────────
# Channels or playlists you follow for new content.
#
# Behaviour:
#   • Only videos published AFTER the first run are processed.
#   • Historical videos are silently skipped on first encounter.
#
# Prompt: config/process.md (summarize)
#
# Add entries like:
#   [[subscriptions]]
#   name = "Channel Name"
#   url  = "https://www.youtube.com/channel/UCxxxxxxxxxxxxxxxxxxxxxx"
# ─────────────────────────────────────────────────────────────────────────────

# Example subscription — replace with a real channel URL:
# [[subscriptions]]
# name = "My Favourite Channel"
# url  = "https://www.youtube.com/channel/UCxxxxxxxxxxxxxxxxxxxxxx"
# prompts = ["default"]   # optional: omit to run all enabled prompts


# ─── SUMMARIZE QUEUE ──────────────────────────────────────────────────────────
# Your personal YouTube playlist used as a summarize inbox.
#
# Behaviour:
#   • Every video in the playlist is processed in order.
#   • Add a video to this playlist on YouTube to queue it for summarization.
#
# Prompt: config/process.md (summarize)
# ─────────────────────────────────────────────────────────────────────────────

[summarize_queue]
name    = "SUMMARIZE playlist (queue)"
url     = "https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
prompts = ["default"]


# ─── TRANSCRIBE QUEUE ─────────────────────────────────────────────────────────
# Your personal YouTube playlist used as a transcribe inbox.
#
# Behaviour:
#   • Every video in the playlist is processed in order.
#   • Add a video to this playlist on YouTube to queue it for transcription.
#
# Prompt: config/transcribe.md (clean transcript, no summarizing)
# ─────────────────────────────────────────────────────────────────────────────

[transcribe_queue]
name = "TRANSCRIBE playlist (queue)"
url  = "https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
